name: Ofoq Render Job

on:
  workflow_dispatch:
    inputs:
      render_url:
        description: 'Full /render/JOB_ID URL'
        required: true
      job_id:
        description: 'Firestore render_jobs document ID'
        required: true
      password:
        description: 'Render job password (leave empty if none)'
        required: false
        default: ''
      scene_name:
        description: 'Scene name for the output filename'
        required: false
        default: 'render'

permissions:
  contents: write

jobs:
  render:
    name: Execute Rendering Process
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # تسريع العمليات المستقبلية عبر التخزين المؤقت

      - name: 3. Install Dependencies
        run: npm install

      - name: 4. Install Playwright & Chrome
        # تثبيت المتصفح مع كافة مكتبات النظام اللازمة (Dependencies)
        run: npx playwright install chrome --with-deps

      - name: 5. Install Media Codecs & Audio Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libavcodec-extra gstreamer1.0-plugins-ugly gstreamer1.0-plugins-bad pulseaudio

      - name: 6. Start PulseAudio (Virtual Audio)
        # تشغيل خادم الصوت الوهمي في الخلفية
        run: |
          pulseaudio -D --exit-idle-time=-1
          sleep 2 # الانتظار للتأكد من استقرار الخدمة

      - name: 7. Run Render Job
        run: |
          # إنشاء مجلد المخرجات
          mkdir -p ./output
          
          # تشغيل السكريبت مع تمرير المدخلات
          node render-job.js \
            --url "${{ github.event.inputs.render_url }}" \
            --password "${{ github.event.inputs.password }}" \
            --output "./output/${{ github.event.inputs.job_id }}.mp4" \
            --job-id "${{ github.event.inputs.job_id }}" \
            --scene-name "${{ github.event.inputs.scene_name }}" \
            --release-tag "ofoq-renders" \
            --timeout 1500
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: 8. Upload Artifact (Optional)
        # خطوة إضافية اختيارية لحفظ الملف داخل GitHub في حال فشل الـ Upload الخارجي
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-video-${{ github.event.inputs.job_id }}
          path: ./output/
