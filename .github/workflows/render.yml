name: Ofoq Render Job

on:
  workflow_dispatch:
    inputs:
      render_url:
        description: 'Full /render/JOB_ID URL'
        required: true
      job_id:
        description: 'Firestore render_jobs document ID'
        required: true
      password:
        description: 'Render job password (leave empty if none)'
        required: false
        default: ''
      scene_name:
        description: 'Scene name for the output filename'
        required: false
        default: 'render'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

  

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # لازم يكون بعد install playwright عشان نعرف المسار
      - name: Inject AAC codec into Playwright Chromium
        run: |
          sudo apt-get install -y chromium-codecs-ffmpeg-extra

          # ابحث عن مسار Playwright's Chromium
          CHROME_DIR=$(find ~/.cache/ms-playwright -name "chrome" -type f 2>/dev/null | head -1 | xargs dirname 2>/dev/null)

          echo "Playwright Chrome dir: $CHROME_DIR"

          if [ -z "$CHROME_DIR" ]; then
            echo "ERROR: Could not find Playwright Chromium directory"
            find ~/.cache/ms-playwright -maxdepth 4 -type f -name "*.so" | head -10
            exit 1
          fi

          if [ ! -f /usr/lib/chromium-browser/libffmpeg.so ]; then
            echo "ERROR: libffmpeg.so not found after apt-get install"
            find /usr/lib -name "libffmpeg.so" 2>/dev/null
            exit 1
          fi

          # استبدل الـ libffmpeg.so المحدودة ببتاعة AAC
          cp /usr/lib/chromium-browser/libffmpeg.so "$CHROME_DIR/libffmpeg.so"
          echo "SUCCESS: libffmpeg.so copied to $CHROME_DIR"

  

      - name: Run render job
        run: |
          node render-job.js \
            --url "${{ inputs.render_url }}" \
            --password "${{ inputs.password }}" \
            --output "./output/${{ inputs.job_id }}.mp4" \
            --job-id "${{ inputs.job_id }}" \
            --scene-name "${{ inputs.scene_name }}" \
            --release-tag "ofoq-renders" \
            --timeout 1500
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
