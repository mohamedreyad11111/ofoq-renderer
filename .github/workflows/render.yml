name: Ofoq Render Job

on:
  workflow_dispatch:
    inputs:
      render_url:
        description: 'Full /render/JOB_ID URL'
        required: true
      job_id:
        description: 'Firestore render_jobs document ID'
        required: true
      password:
        description: 'Render job password (leave empty if none)'
        required: false
        default: ''
      scene_name:
        description: 'Scene name for the output filename'
        required: false
        default: 'render'
      release_tag:
        description: 'GitHub Release tag to upload to (e.g. ofoq-renders or v2025-06)'
        required: false
        default: 'ofoq-renders'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # ── كاش المتصفح: نحفظ Chrome بعد أول تحميل ──────────────────────────

      - name: Get Playwright version (for cache key)
        id: pw-version
        run: echo "version=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chrome-${{ steps.pw-version.outputs.version }}-${{ runner.os }}

      - name: Install Playwright Chrome (+ system deps)
        # --with-deps: يثبت libgbm/nss/fonts اللازمة على Ubuntu
        # لو الكاش موجود → يثبت deps فقط بدون تحميل المتصفح
        run: |
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" = "true" ]; then
            echo "✓ Browser cache hit — installing system deps only"
            npx playwright install-deps chrome
          else
            echo "✗ No cache — downloading Chrome + system deps"
            npx playwright install chrome --with-deps
          fi

      - name: Run render job
        run: |
          mkdir -p ./output

          node render-job.js \
            --url "${{ inputs.render_url }}" \
            --password "${{ inputs.password }}" \
            --output "./output/${{ inputs.job_id }}.mp4" \
            --job-id "${{ inputs.job_id }}" \
            --scene-name "${{ inputs.scene_name }}" \
            --release-tag "${{ inputs.release_tag }}" \
            --timeout 1500
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          CI: true
