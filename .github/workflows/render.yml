name: Ofoq Render Job

on:
  workflow_dispatch:
    inputs:
      render_url:
        description: 'Full /render/JOB_ID URL'
        required: true
      job_id:
        description: 'Firestore render_jobs document ID'
        required: true
      password:
        description: 'Render job password (leave empty if none)'
        required: false
        default: ''
      scene_name:
        description: 'Scene name for the output filename'
        required: false
        default: 'render'
      container:
        description: 'Output container: mp4 or webm'
        required: false
        default: 'mp4'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      # ── Cache Playwright Chrome ──────────────────────────────────────────
      - name: Get Playwright version for cache key
        id: pw-version
        run: |
          PW_VERSION=$(node -p "require('./node_modules/playwright/package.json').version")
          echo "version=$PW_VERSION" >> $GITHUB_OUTPUT

      - name: Cache Playwright Chrome
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chrome-${{ steps.pw-version.outputs.version }}-linux

      - name: Install Playwright Google Chrome + system deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install chrome --with-deps

      - name: Install Chrome system deps only (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chrome
      # ────────────────────────────────────────────────────────────────────

      - name: Run render job
        run: |
          node render-job.js \
            --url "${{ inputs.render_url }}" \
            --password "${{ inputs.password }}" \
            --output "./output/${{ inputs.job_id }}.${{ inputs.container }}" \
            --job-id "${{ inputs.job_id }}" \
            --scene-name "${{ inputs.scene_name }}" \
            --release-tag "ofoq-renders" \
            --timeout 1500
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
