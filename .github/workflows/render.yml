name: Ofoq Render Job

on:
  workflow_dispatch:
    inputs:
      render_url:
        description: 'Full /render/JOB_ID URL'
        required: true
      job_id:
        description: 'Firestore render_jobs document ID'
        required: true
      password:
        description: 'Render job password (leave empty if none)'
        required: false
        default: ''
      scene_name:
        description: 'Scene name for the output filename'
        required: false
        default: 'render'

permissions:
  contents: write

jobs:
  render:
    # تم التغيير إلى Ubuntu لزيادة السرعة وتقليل التكلفة
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # إضافة الـ Cache لتسريع الـ Workflow في المرات القادمة

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Dependencies and Chrome
        # على Ubuntu، أمر --with-deps ضروري جداً لتثبيت مكتبات النظام الناقصة (libgbm, nss, etc.)
        run: npx playwright install chrome --with-deps

      - name: Run render job
        run: |
          # إنشاء مجلد الـ output لتجنب أخطاء المسارات
          mkdir -p ./output
          
          node render-job.js \
            --url "${{ inputs.render_url }}" \
            --password "${{ inputs.password }}" \
            --output "./output/${{ inputs.job_id }}.mp4" \
            --job-id "${{ inputs.job_id }}" \
            --scene-name "${{ inputs.scene_name }}" \
            --release-tag "ofoq-renders" \
            --timeout 1500
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
