name: Ofoq Render Job

on:
  workflow_dispatch:
    inputs:
      render_url:
        description: 'Full /render/JOB_ID URL'
        required: true
      job_id:
        description: 'Firestore render_jobs document ID'
        required: true
      password:
        description: 'Render job password (leave empty if none)'
        required: false
        default: ''
      scene_name:
        description: 'Scene name for the output filename'
        required: false
        default: 'render'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

  

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Inject AAC codec into Playwright Chromium
        run: |
          sudo apt-get install -y chromium-codecs-ffmpeg-extra

          # ابحث عن libffmpeg.so في كل الـ system
          FFMPEG_SRC=$(find /usr /opt /snap -name "libffmpeg.so" 2>/dev/null | head -1)
          echo "Found libffmpeg.so at: $FFMPEG_SRC"

          if [ -z "$FFMPEG_SRC" ]; then
            echo "--- apt-get لم يثبت libffmpeg.so، نجرب ffmpeg مباشرة ---"
            sudo apt-get install -y ffmpeg libavcodec-extra
            FFMPEG_SRC=$(find /usr -name "libffmpeg.so" 2>/dev/null | head -1)
            echo "After ffmpeg install: $FFMPEG_SRC"
          fi

          CHROME_DIR=$(find ~/.cache/ms-playwright -name "chrome" -type f 2>/dev/null | head -1 | xargs dirname)
          echo "Playwright Chrome dir: $CHROME_DIR"

          if [ -z "$FFMPEG_SRC" ] || [ -z "$CHROME_DIR" ]; then
            echo "FATAL: لم نجد المسارات المطلوبة"
            exit 1
          fi

          cp "$FFMPEG_SRC" "$CHROME_DIR/libffmpeg.so"
          echo "SUCCESS: copied $FFMPEG_SRC → $CHROME_DIR/libffmpeg.so"

      - name: Run render job
        run: |
          node render-job.js \
            --url "${{ inputs.render_url }}" \
            --password "${{ inputs.password }}" \
            --output "./output/${{ inputs.job_id }}.mp4" \
            --job-id "${{ inputs.job_id }}" \
            --scene-name "${{ inputs.scene_name }}" \
            --release-tag "ofoq-renders" \
            --timeout 1500
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
